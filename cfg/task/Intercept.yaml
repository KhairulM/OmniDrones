name: Intercept

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 512
  max_episode_length: 600
  env_spacing: 8

# drone_model:
#   name: Hummingbird
#   controller: RateController

time_encoding_dim: 4

reset_thres: 15.0
success_radius: 0.5
reward_distance_scale: 0.8
action_transform: rate

pursuer:
  model: Hummingbird
  controller: RateController
  spawn_pos_range:
    min: [-0.5, -0.5, 1.3]
    max: [0.5, 0.5, 1.9]
  spawn_rpy_range:
    min: [-0.15, -0.15, -0.25]
    max: [0.15, 0.15, 0.25]
  target_speed: 20.0
  use_rot_speed: false
  use_ab_world_frame: false

evader:
  model: Hummingbird
  controller: LeePositionController
  trajectory:
    # type: circular
    # radius: 5.0
    # ang_vel: 1.0
    # type: hover
    type: linear
    speed: 5.0
  trajectories:
    - type: hover
    - type: circular
      radius: 1.0
      ang_vel: 1.0
    - type: linear
      speed: 5.0
  speed_range: [0.8, 1.5]
  spawn_distance_range: [4.0, 7.0]
  boundary_mode: bounce
  bounds:
    min: [-6.0, -6.0, 1.0]
    max: [6.0, 6.0, 4.0]
  use_relative_velocity: false

