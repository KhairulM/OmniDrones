name: Intercept

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 256
  max_episode_length: 600
  env_spacing: 8

drone_model:
  name: Hummingbird
  controller: RateController

time_encoding: false

reset_thres: 15.0
success_radius: 0.5
target_speed_range: [0.8, 1.5]
target_spawn_distance_range: [4.0, 20.0]
target_bounds:
  min: [-6.0, -6.0, 1.0]
  max: [6.0, 6.0, 4.0]

reward_distance_scale: 0.8

action_transform: rate